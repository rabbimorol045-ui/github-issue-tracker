    <header class="flex flex-wrap gap-5 bg-white justify-between items-center py-5 shadow px-11">

        </div>
        <div class="flex gap-3">
            <div class="border relative w-fit px-3 py-2 border-[#E4E4E7] rounded-md">

            <button class="btn bg-[#4A00FF] text-white">+ New Issue</button>
        </div>

            <button onclick="buttonStyle('openBtn')" id="openBtn" class="btn px-9">Open</button>
            <button onclick="buttonStyle('closedBtn')" id="closedBtn" class="btn px-9">Closed</button>
        </div>
    </section>

                <div class="flex gap-2">
